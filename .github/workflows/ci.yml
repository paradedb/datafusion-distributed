name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  TPCDS_SCALE_FACTOR: 0.5 # 0.5 scale factor produces a data dir which is 124MB

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: cargo build

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          components: clippy
      - run: cargo clippy --all-targets --all-features -- -D warnings

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: ./.github/actions/setup
      - run: cargo test --features integration

  # Builds with the `flight` feature off: no `tonic` / `arrow-flight`, and the in-memory transport
  # becomes the default. Uses `build`/`clippy` (not `test`): the benchmarks dev-dependency pulls the
  # crate in with `flight` on, so a `cargo test` here would not actually exercise the no-flight path.
  no-flight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          components: clippy
      - run: cargo build --no-default-features --features integration
      - run: cargo clippy --no-default-features --features integration -- -D warnings

  tpch-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: cargo test --features tpch --test 'tpch_*'

  tpcds-correctness-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: ["01", "02", "03", "04", "05", "06", "07", "08", "09", "10"]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - uses: actions/cache@v4
        with:
          path: testdata/tpcds/main.zip
          key: "main.zip"
      - run: cargo test --features tpcds --test tpcds_correctness_test shard${{ matrix.shard }}

  tpcds-plans-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - uses: actions/cache@v4
        with:
          path: testdata/tpcds/main.zip
          key: "main.zip"
      - run: cargo test --features tpcds --test tpcds_plans_test

  clickbench-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - uses: actions/cache@v4
        with:
          path: testdata/clickbench/
          key: "data"
      - run: cargo test --features clickbench --test 'clickbench_*'

  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
