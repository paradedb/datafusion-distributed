name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  TPCDS_SCALE_FACTOR: 0.5 # 0.5 scale factor produces a data dir which is 124MB

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: cargo build

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          components: clippy
      - run: cargo clippy --all-targets --all-features -- -D warnings

  clippy-no-flight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          components: clippy
      # `--lib` keeps the benchmarks dev-dependency out of the graph; building any test
      # target would re-enable `flight` through feature unification.
      - run: cargo clippy --lib --no-default-features -- -D warnings

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: ./.github/actions/setup
      - run: cargo test --features integration

  tpch-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: cargo test --features tpch --test 'tpch_*'

  tpcds-correctness-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: ["01", "02", "03", "04", "05", "06", "07", "08", "09", "10"]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - uses: actions/cache@v4
        with:
          path: testdata/tpcds/main.zip
          # Key off the source that pins the data URL, so a re-pin re-downloads instead of
          # serving a stale main.zip.
          key: tpcds-data-${{ hashFiles('benchmarks/src/datasets/tpcds.rs') }}
      - run: cargo test --features tpcds --test tpcds_correctness_test shard${{ matrix.shard }}

  tpcds-plans-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - uses: actions/cache@v4
        with:
          path: testdata/tpcds/main.zip
          # Key off the source that pins the data URL, so a re-pin re-downloads instead of
          # serving a stale main.zip.
          key: tpcds-data-${{ hashFiles('benchmarks/src/datasets/tpcds.rs') }}
      - run: cargo test --features tpcds --test tpcds_plans_test

  clickbench-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - uses: actions/cache@v4
        with:
          path: testdata/clickbench/
          key: "data"
      - run: cargo test --features clickbench --test 'clickbench_*'

  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
